<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep-space: #09090f;
            --sidebar-bg: #0e0d1c;
            --card-bubble-bg: rgba(19,18,42,0.96);
            --primary-purple: #7c3aed;
            --secondary-purple: #9333ea;
            --pink-accent: #ec4899;
            --text-primary: #e2e2f5;
            --text-secondary: #9090b8;
            --text-muted: #4a4a78;
            --border-color: rgba(120,60,220,0.18);
            --font-inter: 'Inter', sans-serif;
            --font-space-grotesk: 'Space Grotesk', sans-serif;
            --base-font-size: 15px;
            --line-height-base: 1.6;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font-inter);
            font-size: var(--base-font-size);
            line-height: var(--line-height-base);
            color: var(--text-primary);
            background-color: var(--bg-deep-space);
        }

        body {
            display: flex;
        }

        /* Layout */
        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.hidden-mobile {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
            top: 0;
            left: 0;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Starfield Background */
        .starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            background-color: var(--text-primary);
            border-radius: 50%;
            opacity: 0;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }

        /* Purple Glow Orb */
        .glow-orb {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-purple) 0%, rgba(124, 58, 237, 0) 70%);
            filter: blur(80px);
            z-index: 1;
            pointer-events: none;
        }

        /* Sidebar Top */
        .sidebar-top {
            margin-bottom: 30px;
        }

        .logo {
            font-family: var(--font-space-grotesk);
            font-weight: 800;
            font-size: 2em;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary-purple), var(--pink-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.7em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(90deg, var(--primary-purple), var(--secondary-purple));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .new-chat-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-purple), var(--primary-purple));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .new-chat-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.4);
        }

        .new-chat-btn:hover::before {
            opacity: 1;
        }

        /* Recent Chats */
        .recent-chats {
            flex-grow: 1;
            margin-top: 30px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .recent-chats::-webkit-scrollbar {
            width: 6px;
        }

        .recent-chats::-webkit-scrollbar-track {
            background: var(--sidebar-bg);
        }

        .recent-chats::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .chat-item:hover {
            background-color: rgba(124, 58, 237, 0.1);
        }

        .chat-item.active {
            background-color: rgba(124, 58, 237, 0.2);
            color: var(--text-primary);
        }

        .chat-item-icon {
            margin-right: 10px;
            font-size: 1.2em;
        }

        .chat-item-info {
            flex-grow: 1;
        }

        .chat-item-title {
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-time {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        /* Sidebar Bottom */
        .sidebar-bottom {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .robot-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--primary-purple);
            border: 2px solid var(--primary-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            margin-right: 15px;
            position: relative;
        }

        .robot-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background-color: #34d399; /* Green online dot */
            border-radius: 50%;
            border: 2px solid var(--sidebar-bg);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .pro-badge {
            background-color: var(--pink-accent);
            color: white;
            font-size: 0.7em;
            padding: 3px 8px;
            border-radius: 5px;
            margin-left: 8px;
            font-weight: 700;
        }

        /* Main Chat Header */
        .chat-header {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 10;
        }

        .chat-header .robot-avatar {
            width: 40px;
            height: 40px;
            font-size: 1.3em;
            margin-right: 15px;
        }

        .chat-header .robot-avatar::after {
            display: none;
        }

        .header-info {
            flex-grow: 1;
        }

        .header-title {
            font-weight: 600;
            font-size: 1.1em;
            color: var(--text-primary);
        }

        .header-subtitle {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .header-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2em;
            margin-left: 15px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .header-actions button:hover {
            color: var(--primary-purple);
        }

        .hamburger-menu {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5em;
            cursor: pointer;
            margin-right: 15px;
        }

        /* Mode Bar */
        .mode-bar {
            display: flex;
            justify-content: center;
            padding: 10px 0;
            background-color: var(--sidebar-bg);
            border-bottom: 1px solid var(--border-color);
            gap: 10px;
            position: relative;
            z-index: 9;
        }

        .mode-pill {
            background-color: rgba(19,18,42,0.5);
            color: var(--text-secondary);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mode-pill:hover {
            background-color: rgba(19,18,42,0.8);
            color: var(--text-primary);
        }

        .mode-pill.active {
            background: var(--primary-purple);
            color: white;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3);
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            position: relative;
            z-index: 2;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: var(--bg-deep-space);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        .message-bubble {
            display: flex;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(10px);
            animation: message-fade-up 0.3s ease-out forwards;
        }

        @keyframes message-fade-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble.user {
            justify-content: flex-end;
        }

        .message-bubble.ai .robot-avatar {
            width: 32px;
            height: 32px;
            font-size: 1em;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .message-bubble.ai .robot-avatar::after {
            display: none;
        }

        .message-content {
            max-width: 66%; /* Desktop default */
            padding: 15px;
            border-radius: 15px;
            position: relative;
            word-wrap: break-word;
        }

        .message-bubble.ai .message-content {
            background-color: var(--card-bubble-bg);
            border-bottom-left-radius: 0;
            color: var(--text-primary);
        }

        .message-bubble.user .message-content {
            background: linear-gradient(90deg, var(--primary-purple), var(--secondary-purple));
            color: white;
            border-bottom-right-radius: 0;
        }

        .message-timestamp {
            font-size: 0.75em;
            color: var(--text-muted);
            margin-top: 5px;
            display: block;
        }

        .message-bubble.user .message-timestamp {
            text-align: right;
            color: rgba(255, 255, 255, 0.7);
        }

        .read-ticks {
            color: #4f46e5; /* Indigo */
            font-size: 0.8em;
            margin-left: 5px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            margin-left: 50px; /* Align with AI messages */
            margin-bottom: 20px;
            opacity: 0;
            animation: message-fade-up 0.3s ease-out forwards;
        }

        .typing-indicator .robot-avatar {
            width: 32px;
            height: 32px;
            font-size: 1em;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .typing-indicator .robot-avatar::after {
            display: none;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            background-color: var(--card-bubble-bg);
            padding: 15px;
            border-radius: 15px;
            border-bottom-left-radius: 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background-color: var(--primary-purple);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; background-color: var(--secondary-purple); }
        .typing-dots span:nth-child(3) { animation-delay: 0s; background-color: var(--pink-accent); }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
        }

        /* Input Area */
        .input-area {
            position: sticky;
            bottom: 0;
            width: 100%;
            padding: 20px 30px;
            background: rgba(9, 9, 15, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            width: 100%;
            max-width: 800px;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-container:focus-within {
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.3);
        }

        .input-container button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.4em;
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s ease;
        }

        .input-container button:hover {
            color: var(--primary-purple);
        }

        .input-container textarea {
            flex-grow: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: var(--font-inter);
            font-size: 1em;
            padding: 8px 10px;
            resize: none;
            min-height: 24px; /* Approx one line */
            max-height: 120px; /* Approx 5 lines */
            overflow-y: auto;
            line-height: 1.5;
        }

        .input-container textarea::placeholder {
            color: var(--text-muted);
        }

        .send-button {
            background: linear-gradient(90deg, var(--primary-purple), var(--secondary-purple));
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3);
        }

        .send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(124, 58, 237, 0.5);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(1);
            box-shadow: none;
        }

        .disclaimer {
            font-size: 0.7em;
            color: var(--text-muted);
            margin-top: 10px;
            text-align: center;
        }

        /* Markdown Styling */
        .message-content pre {
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 10px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-content code {
            font-family: monospace;
            font-size: 0.9em;
            color: #e2e2f5;
        }

        .message-content pre code {
            display: block;
            padding: 0;
        }

        .message-content p {
            margin-bottom: 10px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            font-weight: 700;
            color: var(--text-primary);
        }

        .message-content em {
            font-style: italic;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            font-family: var(--font-space-grotesk);
            margin-top: 20px;
            margin-bottom: 10px;
            color: var(--primary-purple);
        }

        .message-content h1 { font-size: 1.8em; }
        .message-content h2 { font-size: 1.5em; }
        .message-content h3 { font-size: 1.2em; }

        .message-content ul {
            list-style-type: disc;
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .message-content ol {
            list-style-type: decimal;
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .message-content li {
            margin-bottom: 5px;
        }

        .message-content blockquote {
            border-left: 4px solid var(--primary-purple);
            padding-left: 15px;
            margin: 10px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .message-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 20px 0;
        }

        .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .message-content th, .message-content td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: left;
        }

        .message-content th {
            background-color: rgba(124, 58, 237, 0.1);
            font-weight: 600;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: absolute;
                height: 100%;
                top: 0;
                left: 0;
                z-index: 1000;
                box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            }

            .sidebar.open {
                transform: translateX(0%);
            }

            .hamburger-menu {
                display: block;
            }

            .chat-header {
                padding: 15px 20px;
            }

            .messages-area {
                padding: 15px 20px;
            }

            .message-content {
                max-width: 82%; /* Mobile */
            }

            .input-area {
                padding: 15px 20px;
            }

            .header-actions button {
                font-size: 1em;
                margin-left: 10px;
            }

            .header-title {
                font-size: 1em;
            }

            .header-subtitle {
                font-size: 0.7em;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.5em;
                letter-spacing: 2px;
            }

            .new-chat-btn {
                padding: 12px 15px;
                font-size: 1em;
            }

            .sidebar-bottom {
                flex-direction: column;
                align-items: flex-start;
            }

            .robot-avatar {
                margin-bottom: 10px;
            }

            .user-info {
                align-items: flex-start;
            }

            .mode-pill {
                padding: 6px 10px;
                font-size: 0.8em;
            }

            .input-container {
                padding: 8px;
            }

            .input-container textarea {
                padding: 6px 8px;
            }

            .send-button {
                width: 36px;
                height: 36px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="logo">NEXO AI</div>
                <div class="subtitle">YOUR AI COMPANION</div>
                <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
            </div>
            <div class="recent-chats" id="recent-chats">
                <!-- Chat history items will be dynamically added here -->
            </div>
            <div class="sidebar-bottom">
                <div class="robot-avatar">🤖</div>
                <div class="user-info">
                    <div class="user-name">NEXO AI <span class="pro-badge">PRO</span></div>
                </div>
            </div>
        </div>
        <div class="main-chat">
            <div class="starfield" id="starfield"></div>
            <div class="glow-orb"></div>
            <div class="chat-header">
                <button class="hamburger-menu" id="hamburger-menu">☰</button>
                <div class="robot-avatar">✨</div>
                <div class="header-info">
                    <div class="header-title">Nexo AI ✨</div>
                    <div class="header-subtitle">Powered by advanced AI</div>
                </div>
                <div class="header-actions">
                    <button title="Search"><i class="fas fa-search"></i></button>
                    <button title="Settings"><i class="fas fa-cog"></i></button>
                </div>
            </div>
            <div class="mode-bar">
                <div class="mode-pill active" data-mode="Smart">Smart 🌟</div>
                <div class="mode-pill" data-mode="Fast">Fast ⚡</div>
                <div class="mode-pill" data-mode="Creative">Creative 🎨</div>
                <div class="mode-pill" data-mode="Coding">Coding &lt;/&gt;</div>
            </div>
            <div class="messages-area" id="messages-area">
                <!-- Messages will be dynamically added here -->
                <div class="message-bubble ai initial-welcome">
                    <div class="robot-avatar">🤖</div>
                    <div class="message-content">
                        <p>Hello! I'm Nexo AI, your personal AI companion. How can I assist you today?</p>
                        <span class="message-timestamp">Just now</span>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-container">
                    <button title="Attach file"><i class="fas fa-paperclip"></i></button>
                    <textarea id="chat-input" placeholder="Type your message..." rows="1"></textarea>
                    <button title="Voice input"><i class="fas fa-microphone"></i></button>
                    <button class="send-button" id="send-button" disabled><i class="fas fa-arrow-up"></i></button>
                </div>
                <div class="disclaimer">
                    Nexo AI can make mistakes. Consider checking important information.
                </div>
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script>
        const chatInput = document.getElementById("chat-input");
        const sendButton = document.getElementById("send-button");
        const messagesArea = document.getElementById("messages-area");
        const modePills = document.querySelectorAll(".mode-pill");
        const newChatBtn = document.getElementById("new-chat-btn");
        const recentChatsArea = document.getElementById("recent-chats");
        const sidebar = document.getElementById("sidebar");
        const hamburgerMenu = document.getElementById("hamburger-menu");
        const starfield = document.getElementById("starfield");

        let currentMode = "Smart";
        let conversationHistory = [];
        let isStreaming = false;

        // Starfield generation
        function createStar() {
            const star = document.createElement("div");
            star.className = "star";
            star.style.width = star.style.height = `${Math.random() * 3 + 1}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            starfield.appendChild(star);
        }

        for (let i = 0; i < 80; i++) {
            createStar();
        }

        // Markdown Parser (simplified)
        function parseMarkdown(markdownText) {
            let html = markdownText
                .replace(/^### (.*$)/gim, "<h3>$1</h3>")
                .replace(/^## (.*$)/gim, "<h2>$1</h2>")
                .replace(/^# (.*$)/gim, "<h1>$1</h1>")
                .replace(/\*\*(.*?)\*\*/gim, "<strong>$1</strong>")
                .replace(/\*(.*?)\*/gim, "<em>$1</em>")
                .replace(/`([^`]+)`/gim, "<code>$1</code>")
                .replace(/^> (.*$)/gim, "<blockquote>$1</blockquote>")
                .replace(/^\s*-\s+(.*$)/gim, "<li>$1</li>")
                .replace(/\n<li>/gim, "<ul><li>")
                .replace(/<\/li>\n/gim, "</li></ul>")
                .replace(/<ul>(.*?)<\/ul>/gim, "<ul>$1</ul>");

            // Handle code blocks
            html = html.replace(/```(\w+)?\n([\s\S]*?)\n```/gim, (match, lang, code) => {
                return `<pre><code class="language-${lang || ''}">${code.trim()}</code></pre>`;
            });

            // Handle tables (very basic, assumes correct markdown table structure)
            html = html.replace(/\n\|(.+)\|\n\|(\-+)\|\n((?:\|.*\|\n)*)/gim, (match, header, separator, body) => {
                let tableHtml = '<table><thead><tr>';
                header.split('|').forEach(h => {
                    if (h.trim()) tableHtml += `<th>${h.trim()}</th>`;
                });
                tableHtml += '</tr></thead><tbody>';
                body.trim().split('\n').forEach(row => {
                    if (row.trim()) {
                        tableHtml += '<tr>';
                        row.split('|').forEach(cell => {
                            if (cell.trim()) tableHtml += `<td>${cell.trim()}</td>`;
                        });
                        tableHtml += '</tr>';
                    }
                });
                tableHtml += '</tbody></table>';
                return tableHtml;
            });

            // Convert remaining newlines to <p> tags if not already inside a block element
            html = html.split("\n").map(line => {
                if (line.trim() === "") return "";
                if (line.startsWith("<h") || line.startsWith("<ul") || line.startsWith("<pre") || line.startsWith("<blockq") || line.startsWith("<table")) {
                    return line;
                }
                return `<p>${line}</p>`;
            }).join("");

            return html;
        }

        // Auto-resize textarea
        function autoResizeTextarea() {
            chatInput.style.height = "auto";
            chatInput.style.height = chatInput.scrollHeight + "px";
        }

        chatInput.addEventListener("input", autoResizeTextarea);
        chatInput.addEventListener("input", () => {
            sendButton.disabled = chatInput.value.trim() === "";
        });

        // Scroll to bottom
        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Render message
        function renderMessage(message, isUser, isStreamingChunk = false) {
            const messageBubble = document.createElement("div");
            messageBubble.classList.add("message-bubble");
            messageBubble.classList.add(isUser ? "user" : "ai");

            let avatarHtml = "";
            if (!isUser) {
                avatarHtml = 
                    `<div class="robot-avatar">🤖</div>`;
            }

            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const contentHtml = isUser ? `<p>${message}</p>` : parseMarkdown(message);

            messageBubble.innerHTML = `
                ${avatarHtml}
                <div class="message-content">
                    ${contentHtml}
                    <span class="message-timestamp">${timestamp} ${isUser ? `<span class="read-ticks">✓✓</span>` : ''}</span>
                </div>
            `;
            messagesArea.appendChild(messageBubble);
            scrollToBottom();

            if (!isStreamingChunk) {
                conversationHistory.push({ role: isUser ? "user" : "assistant", content: message });
                saveChatHistory();
            }
        }

        // Handle mode switching
        modePills.forEach(pill => {
            pill.addEventListener("click", () => {
                modePills.forEach(p => p.classList.remove("active"));
                pill.classList.add("active");
                currentMode = pill.dataset.mode;
                console.log("Mode switched to:", currentMode);
            });
        });

        // Send message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (message === "" || isStreaming) return;

            renderMessage(message, true);
            chatInput.value = "";
            autoResizeTextarea();
            sendButton.disabled = true;
            isStreaming = true;

            // Add typing indicator
            const typingIndicator = document.createElement("div");
            typingIndicator.classList.add("typing-indicator");
            typingIndicator.innerHTML = `
                <div class="robot-avatar">🤖</div>
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesArea.appendChild(typingIndicator);
            scrollToBottom();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        messages: conversationHistory.map(msg => ({ role: msg.role, content: msg.content })),
                        mode: currentMode,
                    }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiResponseContent = "";
                let aiMessageBubble = null;
                let aiMessageContentDiv = null;

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    chunk.split("\n\n").forEach(event => {
                        if (event.startsWith("data: ")) {
                            const data = event.substring(6);
                            if (data === "[DONE]") {
                                return;
                            }
                            try {
                                const json = JSON.parse(data);
                                const text = json.text;

                                if (!aiMessageBubble) {
                                    aiMessageBubble = document.createElement("div");
                                    aiMessageBubble.classList.add("message-bubble", "ai");
                                    aiMessageBubble.innerHTML = `
                                        <div class="robot-avatar">🤖</div>
                                        <div class="message-content">
                                            <span class="message-timestamp">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                        </div>
                                    `;
                                    messagesArea.appendChild(aiMessageBubble);
                                    aiMessageContentDiv = aiMessageBubble.querySelector(".message-content");
                                    aiMessageContentDiv.innerHTML = ""; // Clear timestamp for streaming content
                                }

                                aiResponseContent += text;
                                aiMessageContentDiv.innerHTML = parseMarkdown(aiResponseContent) + 
                                    `<span class="message-timestamp">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>`;
                                scrollToBottom();

                            } catch (e) {
                                console.error("Error parsing SSE data:", e, data);
                            }
                        }
                    });
                }
                if (aiResponseContent) {
                    conversationHistory.push({ role: "assistant", content: aiResponseContent });
                    saveChatHistory();
                }

            } catch (error) {
                console.error("Error fetching chat response:", error);
                renderMessage("Oops! Something went wrong. Please try again.", false);
            } finally {
                isStreaming = false;
                sendButton.disabled = chatInput.value.trim() === "";
                if (typingIndicator) {
                    typingIndicator.remove();
                }
                scrollToBottom();
            }
        }

        sendButton.addEventListener("click", sendMessage);
        chatInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        // New Chat functionality
        function startNewChat() {
            if (conversationHistory.length > 0) {
                const chatTitle = conversationHistory[0].content.substring(0, 30) + "...";
                const chatTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const chatItem = {
                    title: chatTitle,
                    time: chatTime,
                    history: conversationHistory,
                };
                let savedChats = JSON.parse(localStorage.getItem("nexoChats") || "[]");
                savedChats.unshift(chatItem);
                localStorage.setItem("nexoChats", JSON.stringify(savedChats));
            }

            conversationHistory = [];
            messagesArea.innerHTML = `
                <div class="message-bubble ai initial-welcome">
                    <div class="robot-avatar">🤖</div>
                    <div class="message-content">
                        <p>Hello! I'm Nexo AI, your personal AI companion. How can I assist you today?</p>
                        <span class="message-timestamp">Just now</span>
                    </div>
                </div>
            `;
            renderRecentChats();
            scrollToBottom();
        }

        newChatBtn.addEventListener("click", startNewChat);

        // Save/Load Chat History
        function saveChatHistory() {
            // Only save current conversation, not all chats
            // For persistent chat history in sidebar, we'll need a more robust ID system
        }

        function renderRecentChats() {
            recentChatsArea.innerHTML = "";
            const savedChats = JSON.parse(localStorage.getItem("nexoChats") || "[]");
            savedChats.forEach((chat, index) => {
                const chatItemDiv = document.createElement("div");
                chatItemDiv.classList.add("chat-item");
                chatItemDiv.innerHTML = `
                    <span class="chat-item-icon">💬</span>
                    <div class="chat-item-info">
                        <div class="chat-item-title">${chat.title}</div>
                        <div class="chat-item-time">${chat.time}</div>
                    </div>
                `;
                chatItemDiv.addEventListener("click", () => loadChatHistory(index));
                recentChatsArea.appendChild(chatItemDiv);
            });
        }

        function loadChatHistory(index) {
            const savedChats = JSON.parse(localStorage.getItem("nexoChats") || "[]");
            if (savedChats[index]) {
                conversationHistory = savedChats[index].history;
                messagesArea.innerHTML = "";
                conversationHistory.forEach(msg => {
                    renderMessage(msg.content, msg.role === "user", true);
                });
                scrollToBottom();
                // Highlight active chat
                document.querySelectorAll(".chat-item").forEach((item, i) => {
                    if (i === index) item.classList.add("active");
                    else item.classList.remove("active");
                });
            }
        }

        // Mobile sidebar toggle
        hamburgerMenu.addEventListener("click", () => {
            sidebar.classList.toggle("open");
        });

        // Initial render
        renderRecentChats();
        scrollToBottom();

        // Initial state for send button
        sendButton.disabled = chatInput.value.trim() === "";
    </script>
</body>
</html>
